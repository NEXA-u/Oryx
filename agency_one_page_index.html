    <div class="card system"><div class="systemTop"><span class="badge">Booking</span><div class="miniIcon">📅</div></div><h3 data-t="sys2"></h3><p class="muted" data-t="sys2d"></p><div class="outcome"><small data-t="goal"></small><strong data-t="better"></strong></div></div>

    <div class="card system"><div class="systemTop"><span class="badge">Knowledge</span><div class="miniIcon">🧠</div></div><h3 data-t="sys4"></h3><p class="muted" data-t="sys4d"></p><div class="outcome"><small data-t="goal"></small><strong data-t="clean"></strong></div></div>

  <main id="start" class="page"><div class="container contact"><div><div class="pill" data-t="startPill"></div><h1 data-t="startTitle"></h1><p class="lead" data-t="startLead"></p><div class="contactList"><div class="contactItem"><span data-t="email"></span><a class="emailText"></a></div><div class="contactItem"><span data-t="phone"></span><a class="phoneText"></a></div><div class="contactItem"><span data-t="pdf"></span><a class="pdf" target="_blank" data-t="openPdf"></a></div></div></div>
  <div><div class="card formCard"><div class="eyebrow" data-t="formEyebrow"></div><h3 style="font-size:30px" data-t="formTitle"></h3><form id="leadForm" class="formGrid"><div class="field"><label data-t="name"></label><input name="name" required placeholder="..." /></div><div class="field"><label data-t="clinic"></label><input name="clinic" required placeholder="..." /></div><div class="field"><label data-t="phone"></label><input name="phone" required placeholder="05xxxxxxxx" /></div><div class="field"><label data-t="email"></label><input type="email" name="email" placeholder="name@email.com" /></div><div class="field full"><label data-t="type"></label><select name="type" required><option value="">—</option><option>Dental</option><option>Dermatology / Aesthetic</option><option>General clinic</option><option>Medical center</option><option>Other</option></select></div><div class="field full"><label data-t="improve"></label><textarea name="message" required placeholder="..."></textarea></div><div class="field full"><button class="btn primary" type="submit" data-t="submit"></button></div></form><div id="formStatus" class="status" data-t="done"></div></div>
  <div class="card locked"><h3 data-t="bookTitle"></h3><p class="muted" id="lockText" data-t="locked"></p><div class="lockedBtns"><a id="bookBtn" class="btn secondary disabled" target="_blank" data-t="bookConsult"></a><a id="callBtn" class="btn secondary disabled" target="_blank" data-t="bookCall"></a><a class="btn secondary whatsapp" target="_blank">WhatsApp</a><a class="btn secondary pdf" target="_blank">PDF</a></div></div></div></div></main>

  <footer><div class="container footerFlex"><div><strong style="color:#fff" class="brandName">ORXY AI</strong><p style="margin-top:6px" data-t="footer"></p></div><div class="footerLinks"><a href="#home" onclick="go('home')" data-t="navHome"></a><a href="#systems" onclick="go('systems')" data-t="navSystems"></a><a href="#start" onclick="go('start')" data-t="navStart"></a><a class="ig" target="_blank">Instagram</a><a class="tiktok" target="_blank">TikTok</a></div></div></footer>

  <script>
    function applyLang(){const d=T[LANG];document.documentElement.lang=LANG;document.documentElement.dir=d.dir;document.body.style.direction=d.dir;document.getElementById('langBtn').textContent=d.langLabel;document.querySelectorAll('[data-t]').forEach(el=>{el.textContent=d[el.dataset.t]||''});const lock=document.getElementById('lockText');if(lock&&localStorage.getItem('orxy_application_done')) lock.textContent=d.unlocked;}
    function toggleLang(){LANG=LANG==='ar'?'en':'ar';localStorage.setItem('orxy_lang',LANG);applyLang();}
    function setLinks(){document.querySelectorAll('.brandName').forEach(x=>x.textContent=CONFIG.brand);document.querySelectorAll('.ig').forEach(x=>x.href=CONFIG.instagram);document.querySelectorAll('.tiktok').forEach(x=>x.href=CONFIG.tiktok);document.querySelectorAll('.whatsapp').forEach(x=>x.href=CONFIG.whatsapp);document.querySelectorAll('.pdf').forEach(x=>x.href=CONFIG.pdf);document.querySelectorAll('.emailText').forEach(x=>{x.textContent=CONFIG.email;x.href='mailto:'+CONFIG.email});document.querySelectorAll('.phoneText').forEach(x=>{x.textContent=CONFIG.phone;x.href='tel:'+CONFIG.phone});document.getElementById('bookBtn').href=CONFIG.booking;document.getElementById('callBtn').href=CONFIG.callBooking;}
    function go(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.menu a').forEach(a=>a.classList.toggle('active',a.dataset.page===id));history.replaceState(null,'','#'+id);window.scrollTo({top:0,behavior:'smooth'});}
    function unlockBooking(){document.getElementById('bookBtn').classList.remove('disabled');document.getElementById('callBtn').classList.remove('disabled');document.getElementById('formStatus').style.display='block';document.getElementById('lockText').textContent=T[LANG].unlocked;}
    document.getElementById('leadForm').addEventListener('submit',async function(e){e.preventDefault();const data=new FormData(this);if(CONFIG.formEndpoint){try{await fetch(CONFIG.formEndpoint,{method:'POST',body:data,headers:{'Accept':'application/json'}});}catch(err){}}localStorage.setItem('orxy_application_done','yes');unlockBooking();});
    document.querySelectorAll('#bookBtn,#callBtn').forEach(btn=>btn.addEventListener('click',function(e){if(!localStorage.getItem('orxy_application_done')){e.preventDefault();go('start');document.getElementById('leadForm').scrollIntoView({behavior:'smooth',block:'center'});}}));
    setLinks();applyLang();if(localStorage.getItem('orxy_application_done'))unlockBooking();const startPage=location.hash?location.hash.replace('#',''):'home';if(['home','systems','start'].includes(startPage))go(startPage);
  </script>
