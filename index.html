<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oryx | نظام ذكاء اصطناعي للعيادات والمجال الطبي</title>
  <meta name="description" content="Oryx يساعد العيادات والمنشآت الطبية على زيادة العملاء المحتملين، رفع الحجوزات، تقليل الهدر، وتحسين التشغيل باستخدام أنظمة الذكاء الاصطناعي." />
  <style>
    :root {
      --bg: #07111b;
      --bg-soft: #0d1824;
      --card: rgba(255,255,255,0.06);
      --card-2: rgba(255,255,255,0.08);
      --text: #f7fbff;
      --muted: #aab7c6;
      --line: rgba(255,255,255,0.11);
      --primary: #7dd3fc;
      --primary-2: #67e8f9;
      --accent: #d8f5ff;
      --success: #86efac;
      --shadow: 0 24px 80px rgba(0,0,0,.35);
      --radius: 24px;
      --radius-sm: 18px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans Arabic", "Tajawal", "Cairo", Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(103,232,249,.14), transparent 28%),
        radial-gradient(circle at top left, rgba(125,211,252,.14), transparent 32%),
        linear-gradient(180deg, #07111b 0%, #091521 50%, #0a1722 100%);
      color: var(--text);
      line-height: 1.7;
    }

    body.en { direction: ltr; }
    a { color: inherit; text-decoration: none; }
    button, input, textarea, select { font: inherit; }

    .container {
      width: min(calc(100% - 2rem), var(--max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(14px);
      background: rgba(5, 10, 17, .7);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    .nav {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: .85rem;
      font-weight: 800;
      letter-spacing: .02em;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 14px 30px rgba(103,232,249,.22);
      position: relative;
      overflow: hidden;
    }

    .logo::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 13px;
      background: linear-gradient(180deg, rgba(255,255,255,.25), rgba(255,255,255,0));
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--muted);
      font-size: .95rem;
    }

    .nav-links a:hover,
    .nav-links a:focus-visible,
    .lang-toggle:hover,
    .lang-toggle:focus-visible {
      color: var(--text);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .lang-toggle,
    .btn {
      border: 0;
      cursor: pointer;
      min-height: 48px;
      padding: 0 1.1rem;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .55rem;
      transition: .2s ease;
      font-weight: 800;
    }

    .lang-toggle {
      background: rgba(255,255,255,.04);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,.08);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #031018;
      box-shadow: 0 16px 40px rgba(103,232,249,.18);
    }

    .btn-secondary {
      background: rgba(255,255,255,.05);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.08);
    }

    .btn:hover,
    .lang-toggle:hover { transform: translateY(-2px); }

    .hero { padding: 5rem 0 3.5rem; }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.12fr .88fr;
      gap: 1.4rem;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      padding: .48rem .9rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: #dff8ff;
      font-size: .92rem;
      margin-bottom: 1rem;
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--success);
      box-shadow: 0 0 0 8px rgba(134,239,172,.12);
    }

    h1, h2, h3 { line-height: 1.08; margin: 0; letter-spacing: -.03em; }
    h1 { font-size: clamp(2.3rem, 6vw, 5rem); max-width: 12ch; }
    h2 { font-size: clamp(1.8rem, 4vw, 3rem); margin-bottom: .85rem; }
    h3 { font-size: 1.16rem; margin-bottom: .55rem; }

    .hero p,
    .section-lead,
    .muted,
    .faq-answer,
    .testimonial-role,
    .step-card p,
    .card p,
    li { color: var(--muted); }

    .hero p {
      font-size: 1.06rem;
      max-width: 60ch;
      margin: 1.15rem 0 1.6rem;
    }

    .hero-actions,
    .proof,
    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: .85rem;
    }

    .proof span {
      padding: .55rem .82rem;
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      color: #dce9f5;
      font-size: .93rem;
    }

    .hero-card,
    .card,
    .form-card,
    .video-card,
    .final-cta {
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.08);
